<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título da aba -->
    <title>Meus sites favoritos</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h1{
            background-color: #222;
            color: white;
            padding: 20px;
            margin: 0;
        }

        .site{
            background-color: white;
            width: 320px;
            margin: 25px auto;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
        }

        h2{
            color: #333;
        }

        img{
            width: 260px;
            height: 150px;
            border-radius: 10px;
        }

        a{
            text-decoration: none;
            color: blue;
            font-weight: bold;
        }

        a:hover{
            color: red;
        }
    </style>
</head>

<body>

    <!-- Nome do aluno -->
    <h1>Meus sites favoritos: Rafael Figueiredo Pereira</h1>

    <!-- SITE 1 -->
    <div class="site">
        <h2>YouTube</h2>

        <a href="https://www.youtube.com" target="_blank">
            <img src="youtube.jpg" alt="YouTube">
        </a>

        <br><br>

        <a href="https://www.youtube.com" target="_blank">
            Acessar YouTube
        </a>
    </div>

    <!-- SITE 2 -->
    <div class="site">
        <h2>Netflix</h2>

        <a href="https://www.netflix.com/br/" target="_blank">
            <img src="netflix.jpg" alt="Netflix">
        </a>

        <br><br>

        <a href="https://www.netflix.com/br/" target="_blank">
            Acessar Netflix
        </a>
    </div>

    <!-- SITE 3 -->
    <div class="site">
        <h2>Spotify</h2>

        <a href="https://open.spotify.com/" target="_blank">
            <img src="spotify.jpg" alt="Spotify">
        </a>

        <br><br>

        <a href="https://open.spotify.com/" target="_blank">
            Acessar Spotify
        </a>
    </div>

    <!-- SITE 4 -->
    <div class="site">
        <h2>GitHub</h2>

        <a href="https://github.com/" target="_blank">
            <img src="github.jpg" alt="GitHub">
        </a>

        <br><br>

        <a href="https://github.com/" target="_blank">
            Acessar GitHub
        </a>
    </div>

    <!-- SITE 5 -->
    <div class="site">
        <h2>Google</h2>

        <a href="https://www.google.com/" target="_blank">
            <img src="google.jpg" alt="Google">
        </a>

        <br><br>

        <a href="https://www.google.com/" target="_blank">
            Acessar Google
        </a>
    </div>

</body>
</html>
